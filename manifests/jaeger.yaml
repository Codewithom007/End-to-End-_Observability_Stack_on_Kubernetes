apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: tracing
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.52
          env:
            - name: COLLECTOR_OTLP_ENABLED
              value: 'true'
            - name: SPAN_STORAGE_TYPE
              value: memory        # use 'elasticsearch' in production
          ports:
            - containerPort: 16686   # Jaeger UI
            - containerPort: 4317    # OTLP gRPC receiver
            - containerPort: 4318    # OTLP HTTP receiver
            - containerPort: 14268   # Jaeger collector HTTP
            - containerPort: 6831    # Jaeger agent UDP
              protocol: UDP
          resources:
            requests: { memory: 256Mi, cpu: 250m }
            limits:   { memory: 512Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: tracing
spec:
  selector:
    app: jaeger
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: collector-http
      port: 14268
      targetPort: 14268
 
